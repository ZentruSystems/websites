name: Evar Website

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    permissions:
       id-token: write
       contents: read
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: true
          lfs: false

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            evar-website-changed:
              - 'next/evar-website'
          
      - name: Install OIDC Client from Core Package
        run: npm install @actions/core@1.6.0 @actions/http-client
      - name: Get Id Token
        uses: actions/github-script@v6
        id: idtoken
        with:
           script: |
               const coredemo = require('@actions/core')
               return await coredemo.getIDToken()
           result-encoding: string

      - name: Install pnpm
        if: steps.filter.outputs.evar-website-changed == 'true'
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false
          
      - name: Install Node.js
        if: steps.filter.outputs.evar-website-changed == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 23
          cache: 'pnpm'
          cache-dependency-path: ./next/evar-website/

      - name: Install dependencies
        if: steps.filter.outputs.evar-website-changed == 'true'
        working-directory: ./next/evar-website
        run: pnpm install
      
      - name: Static generation of Evar-Website
        if: steps.filter.outputs.evar-website-changed == 'true'
        working-directory: ./next/evar-website
        run: pnpm run build

      - name: Build And Deploy
        if: steps.filter.outputs.evar-website-changed == 'true'
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_GREEN_FOREST_03555EF03 }}
          action: "upload"
          ###### Repository/Build Configurations - These values can be configured to match your app requirements. ######
          # For more information regarding Static Web App workflow configurations, please visit: https://aka.ms/swaworkflowconfig
          app_location: "./next/evar-website" # App source code path
          api_location: "" # Api source code path - optional
          output_location: "out" # Built app content directory - optional
          github_id_token: ${{ steps.idtoken.outputs.result }}
          ###### End of Repository/Build Configurations ######

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          action: "close"
